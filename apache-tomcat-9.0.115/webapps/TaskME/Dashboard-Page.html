<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMe Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {box-sizing: border-box; margin: 0; padding: 0;}
    body {font-family: 'Inter', sans-serif; background: #f9fafb; color: #111;}

    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 40px; background: #fff; border-bottom: 1px solid #e5e7eb;
    }

    .logo {font-size: 1.25rem; font-weight: 700;}
    .logo span {color: #16a34a;}

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 32px;
    }

    h1 {margin-bottom: 12px;}
    p {color: #6b7280; line-height: 1.6; margin-bottom: 10px;}
  </style>
</head>
<body>
  <nav>
    <div class="logo">Task<span>ME</span></div>
  </nav>

  <div class="container">
    <div class="card">
      <h1>Welcome to TaskME</h1>
      <p>You have successfully logged in.</p>
      <p>This page represents the user dashboard after authentication. It will be fully implemented in the next bit.</p>
    </div>
  </div>
</body>
</html>
