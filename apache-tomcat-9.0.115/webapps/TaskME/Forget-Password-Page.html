<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMe Forgot Password Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {box-sizing: border-box; margin: 0; padding: 0;}
    body {font-family: 'Inter', sans-serif; background: #f9fafb; color: #111;}

    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 40px; background: #fff; border-bottom: 1px solid #e5e7eb;
    }
    .logo {font-size: 1.25rem; font-weight: 700; color: #111; text-decoration: none;}
    .logo span {color: #16a34a;}
    .nav-right {display: flex; gap: 10px;}
    .btn {padding: 8px 18px; border-radius: 6px; font-size: 0.875rem; font-weight: 500; cursor: pointer; text-decoration: none;}
    .btn-outline {border: 1px solid #d1d5db; background: #fff; color: #374151;}
    .btn-fill {background: #16a34a; color: #fff; border: none;}
    .btn-fill:hover {background: #15803d;}

    .page {display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 61px); padding: 40px 24px;}

    .form-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 40px; width: 100%; max-width: 420px;
    }
    .back-link {display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; color: #6b7280; text-decoration: none; margin-bottom: 24px;}
    .back-link:hover {color: #16a34a;}

    .form-card h1 {font-size: 1.5rem; font-weight: 700; margin-bottom: 6px;}
    .form-card .subtitle {color: #6b7280; font-size: 0.875rem; margin-bottom: 28px; line-height: 1.6;}

    label {display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; color: #374151;}
    input {
      width: 100%; padding: 10px 14px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 0.875rem; font-family: 'Inter', sans-serif;
      outline: none; margin-bottom: 20px; color: #111;
    }
    input:focus {border-color: #16a34a; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);}

    .btn-submit {
      width: 100%; padding: 11px; background: #16a34a; color: #fff;
      border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
    }
    .btn-submit:hover {background: #15803d;}

    .success {display: none; text-align: center; padding: 8px 0;}
    .success-icon {font-size: 2.5rem; margin-bottom: 16px;}
    .success h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px;}
    .success p {color: #6b7280; font-size: 0.875rem; line-height: 1.6; margin-bottom: 24px;}
  </style>
</head>
<body>

<nav>
  <a href="Home-Page.html" class="logo">Task<span>ME</span></a>
  <div class="nav-right">
    <a href="Log-In-Page.html" class="btn btn-outline">Log In</a>
    <a href="Sign-Up-Page.html" class="btn btn-fill">Sign Up</a>
  </div>
</nav>

<div class="page">
  <div class="form-card">

    <div id="form-view">
      <a href="Log-In-Page.html" class="back-link">← Back to log in</a>
      <h1>Forgot password?</h1>
      <p class="subtitle">Enter the email address associated with your account and we'll send you a reset link.</p>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com">

      <button class="btn-submit" onclick="validate()">Send Reset Link</button>
    </div>

    <div class="success" id="success-view">
      <div class="success-icon">📬</div>
      <h2>Check your inbox</h2>
      <p>If an account exists for that email, a password reset link has been sent. Check your spam folder if you don't see it.</p>
      <a href="Log-In-Page.html" class="btn btn-fill" style="display:block;text-align:center;padding:11px">Back to Log In</a>
    </div>

  </div>
</div>

<script>
  function validate() {
    const email = document.getElementById('email');
    const err = document.getElementById('email-err');
    if (err) err.remove();
    email.style.borderColor = '';

    if (!email.value.trim()) {
      email.style.borderColor = '#ef4444';
      const message = document.createElement('p');
      message.id = 'email-err';
      message.style.cssText = 'color:#ef4444; font-size:0.75rem; margin-top:-16px; margin-bottom:16px;';
      message.textContent = 'This field is required.';
      email.after(message);
      return;
    }

    document.getElementById('form-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
  }
</script>

</body>
</html>
