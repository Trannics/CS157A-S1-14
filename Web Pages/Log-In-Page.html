<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMe Log In Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {box-sizing: border-box; margin: 0; padding: 0;}
    body {font-family: 'Inter', sans-serif; background: #f9fafb; color: #111;}

    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 40px; background: #fff; border-bottom: 1px solid #e5e7eb;
    }
    .logo {font-size: 1.25rem; font-weight: 700; color: #111; text-decoration: none;}
    .logo span {color: #16a34a;}
    .nav-right {display: flex; gap: 10px;}
    .btn {padding: 8px 18px; border-radius: 6px; font-size: 0.875rem; font-weight: 500; cursor: pointer; text-decoration: none;}
    .btn-outline {border: 1px solid #d1d5db; background: #fff; color: #374151;}
    .btn-fill {background: #16a34a; color: #fff; border: none;}
    .btn-fill:hover {background: #15803d;}

    .page {display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 61px); padding: 40px 24px;}

    .form-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 40px; width: 100%; max-width: 420px;
    }
    .form-card h1 {font-size: 1.5rem; font-weight: 700; margin-bottom: 6px;}
    .form-card .subtitle {color: #6b7280; font-size: 0.875rem; margin-bottom: 28px;}
    .form-card .subtitle a {color: #16a34a; text-decoration: none; font-weight: 500;}

    label {display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; color: #374151;}
    input {
      width: 100%; padding: 10px 14px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 0.875rem; font-family: 'Inter', sans-serif;
      outline: none; margin-bottom: 18px; color: #111;
    }
    input:focus {border-color: #16a34a; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

    .form-footer {display: flex; justify-content: flex-end; margin-top: -10px; margin-bottom: 18px;}
    .form-footer a {font-size: 0.8rem; color: #16a34a; text-decoration: none;}

    .btn-submit {
      width: 100%; padding: 11px; background: #16a34a; color: #fff;
      border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
    }
    .btn-submit:hover {background: #15803d;}
  </style>
</head>
<body>

<nav>
  <a href="Home-Page.html" class="logo">Task<span>ME</span></a>
  <div class="nav-right">
    <a href="Log-In-Page.html" class="btn btn-outline">Log In</a>
    <a href="Sign-Up-Page.html" class="btn btn-fill">Sign Up</a>
  </div>
</nav>

<div class="page">
  <div class="form-card">
    <h1>Welcome back!</h1>
    <p class="subtitle">Don't have an account? <a href="Sign-Up-Page.html">Sign up</a></p>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••">

    <div class="form-footer">
      <a href="Forget-Password-Page.html">Forgot password?</a>
    </div>

    <button class="btn-submit" onclick="validate()">Log In</button>
  </div>
</div>

<script>
  function validate() {
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    let ok = true;

    [email, password].forEach(element => {
      element.style.borderColor = '';
      const err = document.getElementById(element.id + '-err');
      if (err) err.remove();
    });

    [email, password].forEach(element => {
      if (!element.value.trim()) {
        element.style.borderColor = '#ef4444';
        const message = document.createElement('p');
        message.id = element.id + '-err';
        message.style.cssText = 'color:#ef4444; font-size:0.75rem ;margin-top:-14px; margin-bottom:14px;';
        message.textContent = 'This field is required.';
        element.after(message);
        ok = false;
      }
    });

    if (ok) window.location.href = '#';
  }
</script>

</body>
</html>
